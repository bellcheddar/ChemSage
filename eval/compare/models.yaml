# ============================================================
# ChemSage comparative eval — model registry
# ============================================================
# All paths are relative to the chem_sage project root.
# Val loss curves are [iter, val_loss] pairs (actual iter numbers).
# R1 curve is estimated (no log file available).
# ============================================================

settings:
  n_examples: 100          # examples sampled from test set
  test_file: data/sft_r5/test.jsonl
  port: 8080               # mlx_lm.server port (one model at a time)
  sample_seed: 42          # reproducible sampling
  baseline: round5         # model id used for Δ column
  server_startup_timeout: 600   # seconds to wait for model to load (32B needs 3-5 min)
  query_timeout: 120       # seconds per query

# ─── model definitions ────────────────────────────────────────

models:
  - id: round1
    display_name: "Round 1"
    subtitle: "Proof-of-concept · Qwen2.5-7B"
    path: models/chem_sage_7b_v1
    color: "#94a3b8"
    log_file: "logs/round1_7b_train.log"
    # Architecture
    base_model: "Qwen2.5-7B-Instruct-4bit"
    params_total: "7.6 B"
    params_trainable: "26 M"
    trainable_pct: "0.34%"
    lora_type: "RSLoRA"
    lora_rank: 32
    lora_scale: 64.0
    adapted_layers: 16
    total_layers: 28
    # Training
    batch_size: 4
    learning_rate: "2.0e-5"
    lr_schedule: "cosine + 50-step warmup"
    seed: 42
    iters_configured: 750
    iters_actual: 750
    iters_note: "ran to completion"
    best_val_loss: 0.389
    best_val_iter: 675
    final_train_loss: 0.400
    training_examples: 1200
    behaviour_classes: 8
    peak_memory_gb: 12.0
    fused_size_gb: 4.2
    training_date: "2026-06-23"
    training_duration: "~4 h (est.)"
    corpus_chunks: 55742
    corpus_note: "base RAG corpus"
    # Val loss curve — estimated (no log file)
