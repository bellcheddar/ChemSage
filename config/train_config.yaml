# ChemSage QLoRA training configuration (MLX-LM native)
#
# This is a native mlx_lm.lora config: run it directly with
#     mlx_lm.lora --config config/train_config.yaml --train
# scripts/train_qlora.py wraps this and prepares the data directory first.
#
# Field names have drifted slightly between mlx-lm versions (e.g. lora_layers vs num_layers).
# Before the first run, pull the example for your installed version and reconcile keys:
#     curl -O https://raw.githubusercontent.com/ml-explore/mlx-lm/main/mlx_lm/examples/lora_config.yaml

# --- Model ---
# Point at an MLX 4-bit model and mlx_lm.lora uses QLoRA automatically.
# Either pull a prequantised one from mlx-community, or quantise yourself:
#     mlx_lm.convert --hf-path Qwen/Qwen2.5-7B-Instruct -q
model: "mlx-community/Qwen2.5-7B-Instruct-4bit"

train: true
fine_tune_type: "lora"          # "lora" (default), "dora", or "full"

# --- Data ---
# MLX expects a DIRECTORY containing train.jsonl and valid.jsonl (chat format:
# one {"messages": [...]} object per line). test.jsonl is used by eval/eval_chem.py only.
data: "data/sft"

# --- Adapter output ---
adapter_path: "adapters/chem_sage_lora"

# --- LoRA parameters ---
# Reduced from rank=16/num_layers=16 to avoid mode collapse seen in earlier runs.
# Smaller rank = fewer trainable params = safer for a 3000-example corpus.
num_layers: 8                   # fine-tune last 8 transformer layers only
lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.k_proj", "self_attn.v_proj", "self_attn.o_proj",
         "mlp.gate_proj", "mlp.up_proj", "mlp.down_proj"]
  rank: 8                       # r — halved; keeps adapter < 50 MB
  scale: 8.0                    # scale matches rank
  dropout: 0.05                 # light dropout guards against overfitting on small corpus

# --- Optimisation ---
# iters=300 ≈ 3 passes over a 3000-example corpus at batch_size=4
# lr=3e-5 (conservative — previous 5e-5 run showed early instability)
iters: 300
batch_size: 4
learning_rate: 3.0e-5
lr_schedule: null
max_seq_length: 2048
grad_checkpoint: true
seed: 42

# --- Reporting / eval / checkpoints ---
steps_per_report: 10
steps_per_eval: 50
val_batches: 25
save_every: 50
