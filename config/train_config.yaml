# ChemSage QLoRA training configuration (MLX-LM native)
#
# Run with: mlx_lm.lora --config config/train_config.yaml --train
#
# Merged from expert recommendations + session-tested settings.
# Key design rationale:
#
#   RSLoRA (use_rslora: true) normalises LoRA updates by 1/√rank rather than
#   1/rank. With rank=32 and lr=1e-4, the effective step size is ≈ 1.77e-5 —
#   more conservative than our previous lr=3e-5 without RSLoRA. The expert's
#   lr=1e-4 is therefore safe in this combination.
#
#   iters=750 with batch_size=4 → 3,000 sample steps ≈ 1.25 epochs over the
#   2,400-example training split. The cosine schedule with 50-step warmup
#   keeps the first ~50 steps well below peak lr, preventing the early
#   instability we saw with a flat schedule.
#
#   weight_decay=0.01 adds AdamW L2 regularisation — important for a small
#   corpus where overfitting is the primary risk after stability.
#
#   Monitor val_loss at steps 25, 50, 75. If it rises past step 200,
#   stop (Ctrl-C) and use the checkpoint at the lowest val loss.

# --- Model ---
model: "mlx-community/Qwen2.5-7B-Instruct-4bit"

train: true
fine_tune_type: "lora"

# --- Data ---
data: "data/sft"

# --- Adapter output ---
adapter_path: "adapters/chem_sage_lora"

# --- LoRA / RSLoRA ---
# Expert: rank=32, scale=64, use_rslora=true → effective alpha = 64/√32 ≈ 11.3
# All 7 projection matrices adapted across the top 16 transformer layers.
num_layers: 16
lora_parameters:
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  rank: 32
  scale: 64.0
  dropout: 0.05

use_rslora: true     # requires mlx-lm >= 0.12; remove if your version rejects it
use_dora: false

# --- Optimisation ---
iters: 750
batch_size: 4
# Collapse observed at peak LR 1e-4 (onset ~6e-5 during warmup).
# With RSLoRA scale=64/rank=32, effective update magnitude = lr × 11.3.
# Peak LR 2e-5 → effective 2.26e-4, roughly 3× below the collapse threshold.
learning_rate: 2.0e-5

# Cosine decay with linear warmup.
# MLX-LM format: arguments=[peak_lr, total_decay_steps]
lr_schedule:
  name: cosine_decay
  warmup: 50
  arguments: [2.0e-5, 750]

weight_decay: 0.01        # AdamW L2 regularisation

# gradient_accumulation_steps is not a native MLX-LM config key in all versions.
# To get effective_batch=16, set batch_size: 8 if you have >=24 GB RAM.
# At 16 GB unified memory with grad_checkpoint, batch_size=4 is the safe default.

max_seq_length: 2048
grad_checkpoint: true     # essential on 16-GB Apple Silicon
seed: 42

# --- Reporting / eval / checkpoints ---
steps_per_report: 10
steps_per_eval: 25
val_batches: 25
save_every: 25            # reduced from 50 so the best checkpoint is never >25 steps away
