# ChemSage QLoRA training configuration (MLX-LM native)
#
# Run with: python scripts/train_launch.py   (sets MLX cache limits, then runs mlx_lm.lora)
# Or:       mlx_lm.lora --config config/train_config.yaml --train   (without cache limits)
#
# Round 4: 64 layers, 6,400 training examples across 67 behaviour classes.
# Pre-launch: run scripts/preflight.sh to flush memory and kill background processes.
#
# Key design rationale:
#
#   RSLoRA (use_rslora: true) normalises LoRA updates by 1/√rank rather than
#   1/rank. With rank=32 and scale=64, effective multiplier ≈ 11.3×.
#
#   iters=1500 with batch_size=4 → 6,000 sample steps ≈ 0.94 epochs over the
#   6,400-example training split. The cosine schedule with 50-step warmup
#   keeps the first ~50 steps well below peak lr.
#
#   weight_decay=0.01 adds AdamW L2 regularisation — important for a small
#   corpus where overfitting is the primary risk after stability.
#
#   Monitor val_loss at steps 25, 50, 75. If it rises past step 200,
#   stop (Ctrl-C) and use the checkpoint at the lowest val loss.

# --- Model ---
model: "mlx-community/Qwen2.5-32B-Instruct-4bit"

train: true
fine_tune_type: "lora"

# --- Data ---
data: "data/sft"

# --- Adapter output ---
adapter_path: "adapters/chem_sage_32b_v3_lora"

# --- LoRA / RSLoRA ---
# Expert: rank=32, scale=64, use_rslora=true → effective alpha = 64/√32 ≈ 11.3
# All 7 projection matrices adapted across the top 32 transformer layers.
# 64 layers: no swap with cache cap, but compute-bound at ~2.5 min/iter on M1 Max.
# 48 layers: also ~2 min/iter — still too slow. 32 layers is the M1 Max sweet spot at ~25 sec/iter.
num_layers: 32
lora_parameters:
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  rank: 32
  scale: 64.0
  dropout: 0.05

use_rslora: true
use_dora: false

# --- Optimisation ---
iters: 1500
batch_size: 4
learning_rate: 2.0e-5

# Cosine decay with linear warmup.
lr_schedule:
  name: cosine_decay
  warmup: 50
  arguments: [2.0e-5, 1500]

weight_decay: 0.01

max_seq_length: 2048
grad_checkpoint: true
seed: 51

# --- Reporting / eval / checkpoints ---
# steps_per_report aligned with steps_per_eval so train/val loss appear at same iters
steps_per_report: 25
steps_per_eval: 25
val_batches: 25
save_every: 25
